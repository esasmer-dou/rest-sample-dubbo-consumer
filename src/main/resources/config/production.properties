# Production overlay for rest-sample-dubbo-consumer.
# Apply with:
#   -Dreactor.config.file=src/main/resources/config/production.properties
# or:
#   REACTOR_CONFIG_FILE=/app/config/production.properties

# Low-RSS production default. Use balanced-dubbo only when 200-RPS is more important than RSS.
reactor.runtime.profile=micro-dubbo
reactor.runtime.low-rss-gate.mode=enforce

# Static Kubernetes Service DNS. This does not require ZooKeeper on the consumer side.
sample.dubbo.discovery=static
reactor.dubbo.providers=rest-sample-dubbo-provider:20880

# If your environment requires ZooKeeper discovery, override these together:
# sample.dubbo.discovery=zookeeper
# reactor.dubbo.registry-address=zookeeper://zookeeper-client.platform.svc.cluster.local:2181
# reactor.dubbo.providers=

# Conservative Dubbo caps for low memory pods.
reactor.dubbo.timeout-ms=1000
reactor.dubbo.retries=0
reactor.dubbo.max-inflight=32
reactor.dubbo.native-connections-per-endpoint=1
reactor.dubbo.native-max-idle-connections-per-endpoint=1
reactor.dubbo.native-async-workers=1
reactor.dubbo.native-async-queue-capacity=32
reactor.dubbo.native-async-transport=blocking
