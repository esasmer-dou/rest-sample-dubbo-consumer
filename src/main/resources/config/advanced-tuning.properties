# Advanced consumer tuning overlay. Use only after p99, 503 ratio, provider capacity and RSS are measured together.

# REST/Rust HTTP and pool knobs. The micro-dubbo profile already provides safe defaults.
reactor.rust.http.max-request-body-bytes=1048576
reactor.rust.http.max-response-body-bytes=8388608
reactor.rust.http.max-inflight-body-bytes=16777216
reactor.rust.http.max-inflight-response-bytes=16777216
reactor.rust.http.max-connections=512
reactor.rust.jni.workers=1
reactor.rust.jni.queue-capacity=128
reactor.rust.response-pool.small-capacity=8
reactor.rust.response-pool.medium-capacity=2
reactor.rust.response-pool.large-capacity=1
reactor.rust.response-pool.huge-capacity=1
reactor.rust.async.max-inflight=64
reactor.rust.async.response-timeout-ms=1500
reactor.rust.json.writer-initial-bytes=4096
reactor.rust.json.writer-retain-max-bytes=32768
reactor.rust.native-cache.max-entries=0
reactor.rust.native-cache.max-bytes=0
reactor.rust.native-cache.ttl-ms=300000

# Per-route admission. Keep DB-backed and command routes lower than pure catalog reads.
reactor.rust.route-admission.enabled=true
reactor.rust.route-admission.default-max-concurrent=0
reactor.rust.route-admission.default-queue-timeout-ms=0
reactor.rust.route-admission.get.api.v1.catalog.nested.max-concurrent=16
reactor.rust.route-admission.get.api.v1.catalog.nested.queue-timeout-ms=100
reactor.rust.route-admission.get.api.v1.catalog.title.max-concurrent=16
reactor.rust.route-admission.get.api.v1.catalog.title.queue-timeout-ms=100
reactor.rust.route-admission.get.api.v1.catalog.count.max-concurrent=16
reactor.rust.route-admission.get.api.v1.catalog.count.queue-timeout-ms=100
reactor.rust.route-admission.get.api.v1.catalog.info.max-concurrent=16
reactor.rust.route-admission.get.api.v1.catalog.info.queue-timeout-ms=100
reactor.rust.route-admission.get.api.v1.catalog.items.max-concurrent=16
reactor.rust.route-admission.get.api.v1.catalog.items.queue-timeout-ms=100
reactor.rust.route-admission.get.api.v1.catalog.attributes.max-concurrent=16
reactor.rust.route-admission.get.api.v1.catalog.attributes.queue-timeout-ms=100
reactor.rust.route-admission.get.api.v1.catalog.db.customers.max-concurrent=8
reactor.rust.route-admission.get.api.v1.catalog.db.customers.queue-timeout-ms=150
reactor.rust.route-admission.get.api.v1.customers.db.max-concurrent=8
reactor.rust.route-admission.get.api.v1.customers.db.queue-timeout-ms=150
reactor.rust.route-admission.get.api.v1.customers.db.stats.max-concurrent=4
reactor.rust.route-admission.get.api.v1.customers.db.stats.queue-timeout-ms=150
reactor.rust.route-admission.get.api.v1.customers.db.by-segment.max-concurrent=4
reactor.rust.route-admission.get.api.v1.customers.db.by-segment.queue-timeout-ms=150
reactor.rust.route-admission.get.api.v1.customers.db.id.max-concurrent=8
reactor.rust.route-admission.get.api.v1.customers.db.id.queue-timeout-ms=150
reactor.rust.route-admission.get.api.v1.customers.id.exists.max-concurrent=8
reactor.rust.route-admission.get.api.v1.customers.id.exists.queue-timeout-ms=150
reactor.rust.route-admission.get.api.v1.customers.id.display-name.max-concurrent=8
reactor.rust.route-admission.get.api.v1.customers.id.display-name.queue-timeout-ms=150
reactor.rust.route-admission.post.api.v1.customers.max-concurrent=8
reactor.rust.route-admission.post.api.v1.customers.queue-timeout-ms=150
reactor.rust.route-admission.post.api.v1.customers.typed.max-concurrent=8
reactor.rust.route-admission.post.api.v1.customers.typed.queue-timeout-ms=250
reactor.rust.route-admission.patch.api.v1.customers.id.segment.max-concurrent=8
reactor.rust.route-admission.patch.api.v1.customers.id.segment.queue-timeout-ms=150
reactor.rust.route-admission.patch.api.v1.customers.id.status.max-concurrent=8
reactor.rust.route-admission.patch.api.v1.customers.id.status.queue-timeout-ms=150
reactor.rust.route-admission.patch.api.v1.customers.id.status.typed.max-concurrent=8
reactor.rust.route-admission.patch.api.v1.customers.id.status.typed.queue-timeout-ms=250
reactor.rust.route-admission.delete.api.v1.customers.id.max-concurrent=8
reactor.rust.route-admission.delete.api.v1.customers.id.queue-timeout-ms=150

