server.port=8080
server.host=0.0.0.0

# Runtime values are explicit in this file. These are v3.1-aligned low-RSS values; the sample app
# does not apply hidden code-side profile presets.
reactor.rust.http.max-request-body-bytes=1048576
reactor.rust.http.max-response-body-bytes=8388608
reactor.rust.http.max-inflight-body-bytes=16777216
reactor.rust.http.max-inflight-response-bytes=16777216
reactor.rust.http.max-connections=1024
reactor.rust.http.max-request-header-bytes=16384
reactor.rust.http.max-request-headers=64
reactor.rust.http.header-read-timeout-ms=5000
reactor.rust.http.request-body-timeout-ms=10000
reactor.rust.http.idle-timeout-ms=30000
reactor.rust.http.http1-only-enabled=true
reactor.rust.http.keep-alive-enabled=true
reactor.rust.log.level=error
reactor.rust.java.log.level=warn
reactor.rust.jni.workers=2
reactor.rust.jni.queue-capacity=512
reactor.rust.response-pool.small-capacity=64
reactor.rust.response-pool.medium-capacity=64
reactor.rust.response-pool.large-capacity=2
reactor.rust.response-pool.huge-capacity=1
reactor.rust.websocket.max-frame-bytes=1048576
reactor.rust.websocket.outbound-queue-capacity=32
reactor.rust.websocket.send-timeout-ms=1000
reactor.rust.runtime.worker-threads=2
reactor.rust.runtime.max-blocking-threads=4
reactor.rust.runtime.thread-stack-bytes=262144
reactor.rust.native-cache.max-entries=256
reactor.rust.native-cache.max-bytes=4194304
reactor.rust.native-cache.ttl-ms=300000
reactor.rust.async.max-inflight=128
reactor.rust.async.response-timeout-ms=2000
reactor.rust.json.writer-initial-bytes=4096
reactor.rust.json.writer-retain-max-bytes=65536

# Dubbo consumer: native/static-provider mode is the minimum-overhead path.
sample.dubbo.discovery=static
reactor.dubbo.application-name=rest-sample-dubbo-consumer
reactor.dubbo.transport=native
reactor.dubbo.runtime-profile=default
reactor.dubbo.registry-address=zookeeper://127.0.0.1:2181
reactor.dubbo.registry-root=dubbo
reactor.dubbo.registry-timeout-ms=3000
reactor.dubbo.registry-session-timeout-ms=30000
reactor.dubbo.registry-check=false
reactor.dubbo.providers=127.0.0.1:20880
reactor.dubbo.timeout-ms=1000
reactor.dubbo.retries=0
reactor.dubbo.check=false
reactor.dubbo.lazy=true
reactor.dubbo.protocol=dubbo
reactor.dubbo.serialization=hessian2
reactor.dubbo.cluster=failfast
reactor.dubbo.loadbalance=random
reactor.dubbo.connections=1
reactor.dubbo.share-connections=1
reactor.dubbo.refer-thread-num=1
reactor.dubbo.max-inflight=64
reactor.dubbo.max-response-bytes=8388608
reactor.dubbo.native-connections-per-endpoint=2
reactor.dubbo.native-async-workers=2
reactor.dubbo.native-async-queue-capacity=128
