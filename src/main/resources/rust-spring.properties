# Minimum local profile.
# This file is intentionally small. Use -Dreactor.config.file=src/main/resources/config/production.properties
# or REACTOR_CONFIG_FILE for production and advanced overrides.

server.port=8080
server.host=0.0.0.0
reactor.runtime.profile=micro-dubbo

# Component and route indexes are generated by the build. Keep them required in this sample.
reactor.startup.component-index.enabled=true
reactor.startup.component-index.required=true
reactor.startup.route-index.validate=true
reactor.startup.route-index.required=true
reactor.startup.scan.fallback-enabled=false

# Dubbo consumer: static provider mode is the minimum-overhead path for Kubernetes Service DNS.
sample.consumer.surface=full
sample.dubbo.discovery=static
sample.dubbo.read-retry-on-io-error=true
reactor.dubbo.enabled=true
reactor.dubbo.application-name=rest-sample-dubbo-consumer
reactor.dubbo.registry-address=zookeeper://127.0.0.1:2181
reactor.dubbo.registry-root=dubbo
reactor.dubbo.providers=127.0.0.1:20880

# Protect command routes that update the same customer key.
sample.command.customer-key-admission.enabled=true
sample.command.customer-key-admission.max-concurrent-per-key=1
sample.command.customer-key-admission.stripes=1024
